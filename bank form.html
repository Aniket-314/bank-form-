<!DOCTYPE html>
<html>

<head>
    <title>SCAM BANK DOUBLE YOUR MONEY</title>
</head>

<body>

    <div align="center">

        <h1>Bank Form</h1>

        <form>

            Username:
            <input type="text" name="username"><br><br>

            Password:
            <input type="password" name="password"><br><br>

            Confirm Password:
            <input type="password" name="confirm_password"><br><br>

            Email ID:
            <input type="email" name="email"><br><br>

            Phone:
            +91 <input type="tel" pattern="[0-9]{10}" maxlength="10" placeholder="9876543210"><br><br>

            Date of Birth:
            <input type="date" name="dob"><br><br>

            Age:
            <input type="number" name="age"><br><br>

            Pincode:
            <input type="number" name="pincode"><br><br>

            Street:
            <input type="text" name="street"><br><br>

            City:
            <input type="text" name="city"><br><br>

            State:
            <input type="text" name="state"><br><br>

            <a href="register.html">
                <button type="button">Register</button>
            </a>

            <input type="reset" value="Reset">

            <input type="button" value="Confirm"
                   onclick="alert('Your details have been confirmed successfully!')">

        </form>

    </div>

</body>

</html>
